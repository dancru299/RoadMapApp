services:
  postgres:
    image: postgres:17-alpine
    container_name: roadmap_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-roadmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roadmap_secret}
      POSTGRES_DB: ${POSTGRES_DB:-roadmap_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roadmap}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
